services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/frontend
    tty: true
  backend:
    build: ./backend
    ports:
      - "3030:3030"
    volumes:
      - ./backend:/backend
    tty: true
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: casino_db
    volumes:
      - db_data:/var/lib/postgresql/data
volumes:
  redis_data:
  db_data:
